[flake8]
max-line-length = 100
exclude =
    venv,
    .venv,
    __pycache__,
    .pytest_cache,
    build,
    dist
extend-ignore =
    E203,   # whitespace before ':' (conflicts with black)
    W503    # line break before binary operator (conflicts with black)

[tool:pytest]
testpaths = tests
asyncio_mode = auto

[mypy]
python_version = 3.10
ignore_missing_imports = True
